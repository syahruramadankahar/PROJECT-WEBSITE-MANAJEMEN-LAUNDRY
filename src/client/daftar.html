<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Transaksi - NyucyGo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Mobile Navbar -->
    <div
      id="mobileNavbar"
      class="d-lg-none d-flex justify-content-between align-items-center"
    >
      <div class="d-flex align-items-center gap-2 text-primary">
        <i class="bi bi-washing-machine fs-4"></i>
        <span class="fw-bold fs-5">NyucyGo</span>
      </div>
      <button class="btn btn-light border" id="sidebarToggle">
        <i class="bi bi-list fs-4"></i>
      </button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="mainSidebar">
      <div class="sidebar-brand">
        <img src="/logo1.png" alt="NyucyGo Logo" class="brand-logo" />
        <h4 class="mb-0 fw-bold tracking-tight">NyucyGo</h4>
      </div>

      <nav class="flex-grow-1 mt-2">
        <a href="dashboard.html" class="nav-link">
          <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <a href="transaksi.html" class="nav-link">
          <i class="bi bi-plus-circle"></i> Input Transaksi
        </a>
        <a href="daftar.html" class="nav-link active">
          <i class="bi bi-card-checklist"></i> Daftar Cucian
        </a>
      </nav>

      <div class="p-3 border-top">
        <a href="#" id="logoutBtn" class="nav-link text-danger">
          <i class="bi bi-box-arrow-left"></i> Logout
        </a>
      </div>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="main-content">
      <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h2 class="fw-bold mb-1">Daftar Transaksi</h2>
          <p class="text-muted mb-0">
            Kelola dan pantau status semua cucian pelanggan.
          </p>
        </div>
        <a
          href="transaksi.html"
          class="btn btn-primary d-flex align-items-center gap-2"
        >
          <i class="bi bi-plus-lg"></i> Transaksi Baru
        </a>
      </header>

      <div class="table-card">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>Invoice & Tanggal</th>
                <th>Pelanggan</th>
                <th>Layanan</th>
                <th class="text-end">Biaya</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="daftarTableBody">
              <!-- Content via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
