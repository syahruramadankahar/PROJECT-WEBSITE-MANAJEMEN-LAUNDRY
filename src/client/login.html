<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - NyucyGo Laundry</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-light">
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center"
    >
      <div
        class="card shadow-sm border-0 rounded-4 overflow-hidden"
        style="max-width: 450px; width: 100%"
      >
        <div class="bg-primary p-5 text-center text-white position-relative">
          <div class="mb-3">
            <i class="bi bi-washing-machine fs-1"></i>
          </div>
          <h2 class="fw-bold tracking-tight">NyucyGo</h2>
          <p class="mb-0 opacity-75 small uppercase fw-semibold tracking-wider">
            Nyuci cepat, tanpa ribet
          </p>
        </div>
        <div class="card-body p-4 p-md-5">
          <!-- Tab Navigation -->
          <ul
            class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-3"
            id="loginTab"
            role="tablist"
          >
            <li class="nav-item">
              <button
                class="nav-link active rounded-3 fw-bold small text-uppercase"
                id="admin-tab"
                data-bs-toggle="pill"
                data-bs-target="#admin-form"
                type="button"
              >
                Admin
              </button>
            </li>
            <li class="nav-item">
              <button
                class="nav-link rounded-3 fw-bold small text-uppercase"
                id="customer-tab"
                data-bs-toggle="pill"
                data-bs-target="#customer-form"
                type="button"
              >
                Pelanggan
              </button>
            </li>
          </ul>

          <div class="tab-content" id="loginTabContent">
            <!-- Admin Login -->
            <div class="tab-pane fade show active" id="admin-form">
              <form id="formAdminLogin">
                <div class="mb-3">
                  <label class="form-label small fw-bold text-secondary"
                    >Username</label
                  >
                  <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                      ><i class="bi bi-person text-muted"></i
                    ></span>
                    <input
                      type="text"
                      id="adminUser"
                      class="form-control border-start-0 ps-0"
                      placeholder="admin"
                      required
                    />
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-secondary"
                    >Password</label
                  >
                  <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                      ><i class="bi bi-lock text-muted"></i
                    ></span>
                    <input
                      type="password"
                      id="adminPass"
                      class="form-control border-start-0 ps-0"
                      placeholder="••••••••"
                      required
                    />
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-bold mt-2"
                >
                  Masuk Dashboard <i class="bi bi-arrow-right ms-2"></i>
                </button>
              </form>
            </div>

            <!-- Customer Logic -->
            <div class="tab-pane fade" id="customer-form">
              <form id="formCustomerLogin">
                <div class="mb-4">
                  <label class="form-label small fw-bold text-secondary"
                    >Kode Transaksi (Invoice)</label
                  >
                  <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                      ><i class="bi bi-search text-muted"></i
                    ></span>
                    <input
                      type="text"
                      id="custInvoice"
                      class="form-control border-start-0 ps-0"
                      placeholder="Contoh: INV-123456"
                      required
                    />
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-bold"
                >
                  Lacak Cucian <i class="bi bi-search ms-2"></i>
                </button>
              </form>
            </div>
          </div>
          <div class="text-center mt-4 text-muted small">
            &copy; 2024 NyucyGo Laundry.
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
