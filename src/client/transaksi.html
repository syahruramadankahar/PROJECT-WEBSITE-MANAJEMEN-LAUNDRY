<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Transaksi - NyucyGo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Mobile Navbar -->
    <div
      id="mobileNavbar"
      class="d-lg-none d-flex justify-content-between align-items-center"
    >
      <div class="d-flex align-items-center gap-2 text-primary">
        <i class="bi bi-washing-machine fs-4"></i>
        <span class="fw-bold fs-5">NyucyGo</span>
      </div>
      <button class="btn btn-light border" id="sidebarToggle">
        <i class="bi bi-list fs-4"></i>
      </button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="mainSidebar">
      <div class="sidebar-brand">
        <img src="/logo1.png" alt="NyucyGo Logo" class="brand-logo" />
        <h4 class="mb-0 fw-bold tracking-tight">NyucyGo</h4>
      </div>

      <nav class="flex-grow-1 mt-2">
        <a href="dashboard.html" class="nav-link">
          <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <a href="transaksi.html" class="nav-link active">
          <i class="bi bi-plus-circle"></i> Input Transaksi
        </a>
        <a href="daftar.html" class="nav-link">
          <i class="bi bi-card-checklist"></i> Daftar Cucian
        </a>
      </nav>

      <div class="p-3 border-top">
        <a href="#" id="logoutBtn" class="nav-link text-danger">
          <i class="bi bi-box-arrow-left"></i> Logout
        </a>
      </div>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="main-content">
      <h2 class="fw-bold mb-1">Input Transaksi Baru</h2>
      <p class="text-muted mb-5">Penerimaan cucian baru dari pelanggan.</p>

      <div class="row g-4">
        <div class="col-lg-8">
          <div
            class="card p-4 p-md-5 border-0 shadow-sm"
            style="border-radius: 20px"
          >
            <form id="formTransaksi">
              <div class="row g-4">
                <div class="col-md-6">
                  <label
                    class="form-label fw-bold small text-uppercase tracking-wider"
                    >Nama Pelanggan</label
                  >
                  <input
                    type="text"
                    id="nama"
                    class="form-control"
                    placeholder="Contoh: Budi Santoso"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label
                    class="form-label fw-bold small text-uppercase tracking-wider"
                    >Nomor HP</label
                  >
                  <input
                    type="tel"
                    id="hp"
                    class="form-control"
                    placeholder="0812xxxx"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label
                    class="form-label fw-bold small text-uppercase tracking-wider"
                    >Layanan</label
                  >
                  <select id="layanan" class="form-select" required>
                    <option value="Cuci Kering">Cuci Kering Saja</option>
                    <option value="Cuci Setrika">Cuci Setrika</option>
                    <option value="Setrika Saja">Setrika Saja</option>
                    <option value="Bedcover / Selimut">
                      Bedcover / Selimut
                    </option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label
                    class="form-label fw-bold small text-uppercase tracking-wider"
                    >Berat (Kg)</label
                  >
                  <input
                    type="number"
                    step="0.1"
                    id="berat"
                    class="form-control"
                    value="1"
                    min="0.1"
                    required
                  />
                </div>
                <div class="col-12 mt-4 pt-3 border-top">
                  <button
                    type="submit"
                    class="btn btn-primary d-flex align-items-center gap-2"
                  >
                    <i class="bi bi-check2-circle fs-5"></i> Simpan & Cetak
                    Invoice
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-4 mt-4 mt-lg-0">
          <div
            class="card-stat bg-primary text-white border-0 shadow-lg"
            style="
              box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3) !important;
            "
          >
            <h6
              class="text-uppercase small fw-bold tracking-widest opacity-75 mb-4"
            >
              Informasi Biaya
            </h6>
            <div class="d-flex justify-content-between mb-2">
              <span class="opacity-90">Harga Layanan</span>
              <span class="fw-bold" id="displayHargaPerKg">Rp 0</span>
            </div>
            <hr class="my-4 opacity-25" />
            <div class="text-center py-2">
              <p class="mb-1 opacity-75 small fw-medium">Total Tagihan</p>
              <h3 class="fw-black mb-0" id="displayTotal">Rp 0</h3>
            </div>
          </div>

          <div
            class="card p-4 border-0 mt-4 bg-soft-blue shadow-none"
            style="border-radius: 20px"
          >
            <h6 class="fw-bold small text-primary mb-2">
              <i class="bi bi-clock-fill me-1"></i> Estimasi Selesai
            </h6>
            <p class="mb-0 fw-bold text-dark" id="displayEstimasi">
              Menghitung...
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
