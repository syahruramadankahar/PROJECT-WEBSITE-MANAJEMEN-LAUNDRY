<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lacak Cucian - NyucyGo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="max-w-700 mx-auto" style="max-width: 700px; margin: 0 auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center gap-2">
            <div class="bg-primary text-white p-2 rounded-3">
              <i class="bi bi-washing-machine fs-5"></i>
            </div>
            <h5 class="fw-bold mb-0">NyucyGo Tracking</h5>
          </div>
          <a
            href="#"
            id="logoutBtn"
            class="text-secondary text-decoration-none fw-semibold"
            >Keluar <i class="bi bi-box-arrow-right"></i
          ></a>
        </div>

        <div
          class="card p-4 p-md-5 border-0 shadow-sm mb-4"
          style="border-radius: 24px"
        >
          <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4 mb-5 pb-4 border-bottom"
          >
            <div>
              <span
                class="text-muted small text-uppercase fw-bold ls-1 d-block mb-1"
                >Status Cucian</span
              >
              <div id="trackStatus" class="d-inline-block">Memuat...</div>
            </div>
            <div class="text-md-end">
              <span
                class="text-muted small text-uppercase fw-bold ls-1 d-block mb-1"
                >Kode Transaksi</span
              >
              <h4
                id="trackId"
                class="fw-black text-primary mb-0 font-monospace"
              >
                ####
              </h4>
            </div>
          </div>

          <!-- Progress Message -->
          <div id="trackStatusProgress" class="mb-5"></div>

          <!-- Timeline -->
          <div id="trackingTimeline" class="tracking-steps">
            <!-- Dinamis via script.js -->
          </div>
        </div>

        <!-- Footer Bantuan -->
        <div class="text-center opacity-75 small">
          <p>Tunjukkan halaman ini saat pengambilan cucian.</p>
          <div class="d-flex justify-content-center gap-3">
            <a href="#" class="text-decoration-none"
              ><i class="bi bi-whatsapp"></i> Chat Admin</a
            >
            <span class="text-muted">|</span>
            <a href="#" class="text-decoration-none"
              ><i class="bi bi-geo-alt"></i> Lokasi Toko</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
